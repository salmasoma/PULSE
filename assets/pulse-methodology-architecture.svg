<svg width="1400" height="860" viewBox="0 0 1400 860" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1400" y2="860" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FBFF"/>
      <stop offset="1" stop-color="#EEF6FF"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E8F1FF"/>
      <stop offset="1" stop-color="#DCEBFF"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#F1ECFF"/>
      <stop offset="1" stop-color="#E5DDFF"/>
    </linearGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#E5FBF7"/>
      <stop offset="1" stop-color="#D4F3EC"/>
    </linearGradient>
    <linearGradient id="card4" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#FFF3E5"/>
      <stop offset="1" stop-color="#FFE7C9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-color="#0F172A" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="10" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#2F4B7C"/>
    </marker>
  </defs>

  <rect width="1400" height="860" rx="28" fill="url(#bg)"/>

  <text x="80" y="92" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700">
    PULSE Methodology and Deployment Architecture
  </text>
  <text x="80" y="132" fill="#425466" font-family="Arial, Helvetica, sans-serif" font-size="18">
    Four-phase pipeline from multi-domain specialist training to evidence-grounded on-device reporting and local VQA
  </text>

  <rect x="80" y="180" width="280" height="520" rx="26" fill="url(#card1)" stroke="#B8D0FF" filter="url(#shadow)"/>
  <rect x="400" y="180" width="280" height="520" rx="26" fill="url(#card2)" stroke="#D0BFFF" filter="url(#shadow)"/>
  <rect x="720" y="180" width="280" height="520" rx="26" fill="url(#card3)" stroke="#B5E8DA" filter="url(#shadow)"/>
  <rect x="1040" y="180" width="280" height="520" rx="26" fill="url(#card4)" stroke="#FFD29A" filter="url(#shadow)"/>

  <text x="104" y="230" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">PHASE 1</text>
  <text x="104" y="268" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Multi-domain</text>
  <text x="104" y="302" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">specialist training</text>
  <text x="104" y="348" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Inputs</text>
  <text x="104" y="380" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• 9 ultrasound domains</text>
  <text x="104" y="408" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• patient/case-aware splits</text>
  <text x="104" y="436" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• 19 heterogeneous tasks</text>
  <text x="104" y="484" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Controller</text>
  <text x="104" y="516" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• planner: task-family scheduling</text>
  <text x="104" y="544" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• curriculum: epoch adaptation</text>
  <text x="104" y="572" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• critic: validation reward</text>
  <text x="104" y="600" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• recovery: rollback and LR reset</text>
  <text x="104" y="652" fill="#1E3A5F" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Output</text>
  <text x="104" y="684" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">Teacher specialists and router</text>

  <text x="424" y="230" fill="#523B8F" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">PHASE 2</text>
  <text x="424" y="268" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Compression and</text>
  <text x="424" y="302" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">mobile packaging</text>
  <text x="424" y="348" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">TinyML steps</text>
  <text x="424" y="380" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• channel pruning</text>
  <text x="424" y="408" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• INT8 post-training quantization</text>
  <text x="424" y="436" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• teacher-student distillation</text>
  <text x="424" y="484" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Exports</text>
  <text x="424" y="516" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• Core ML specialist bundles</text>
  <text x="424" y="544" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• manifest-driven iOS packaging</text>
  <text x="424" y="572" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• optional GGUF VQA assets</text>
  <text x="424" y="624" fill="#523B8F" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Output</text>
  <text x="424" y="656" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">Compact deployable students</text>
  <text x="424" y="684" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">for local mobile execution</text>

  <text x="744" y="230" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">PHASE 3</text>
  <text x="744" y="268" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">On-device routing</text>
  <text x="744" y="302" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">and evidence building</text>
  <text x="744" y="348" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Runtime flow</text>
  <text x="744" y="380" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• intake from camera, library, files</text>
  <text x="744" y="408" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• domain router selects specialists</text>
  <text x="744" y="436" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• task heads produce labels, masks,</text>
  <text x="744" y="460" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">  boxes, and scalar measurements</text>
  <text x="744" y="508" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Evidence bundle E(x)</text>
  <text x="744" y="540" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• routed domain d</text>
  <text x="744" y="568" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• quality q</text>
  <text x="744" y="596" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• labels l, masks s, boxes b</text>
  <text x="744" y="624" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• measurements r</text>
  <text x="744" y="676" fill="#115E59" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Output</text>
  <text x="744" y="708" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">Structured specialist evidence</text>

  <text x="1064" y="230" fill="#9A4D00" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="700">PHASE 4</text>
  <text x="1064" y="268" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">Grounded report</text>
  <text x="1064" y="302" fill="#0F172A" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="700">and local VQA</text>
  <text x="1064" y="348" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Reasoning path</text>
  <text x="1064" y="380" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• structured report uses E(x)</text>
  <text x="1064" y="408" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• measurements and masks injected</text>
  <text x="1064" y="436" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• PDF export and local case history</text>
  <text x="1064" y="484" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">Optional VQA</text>
  <text x="1064" y="516" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• image plus evidence-conditioned</text>
  <text x="1064" y="544" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• local multimodal backend</text>
  <text x="1064" y="572" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">• fallback to grounded composer</text>
  <text x="1064" y="624" fill="#9A4D00" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Output</text>
  <text x="1064" y="656" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">Clinician-facing report</text>
  <text x="1064" y="684" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="16">and interactive local QA</text>

  <path d="M360 440H392" stroke="#2F4B7C" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M680 440H712" stroke="#2F4B7C" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M1000 440H1032" stroke="#2F4B7C" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="80" y="740" width="1240" height="70" rx="20" fill="#FFFFFF" stroke="#D8E4F1"/>
  <text x="110" y="783" fill="#334155" font-family="Arial, Helvetica, sans-serif" font-size="18">
    End-to-end design principle: specialist evidence is the primary clinical signal; reporting and VQA are layered on top of structured outputs rather than replacing them.
  </text>
</svg>

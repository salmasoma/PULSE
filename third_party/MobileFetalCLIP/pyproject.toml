[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mobile-fetal-clip"
version = "0.2.0"
description = "Training and evaluation code for MobileFetalCLIP"
readme = "README.md"
requires-python = ">=3.10"
license = {text = "MIT"}
authors = [
    {name = "Numan Saeed"},
    {name = "Fadillah Adamsyah Maani"},
    {name = "Mohammad Yaqub"},
]

dependencies = [
    "torch>=2.1.0",
    "torchvision>=0.16.0",
    "timm>=0.9.7",
    "open-clip-torch>=2.24.0",
    "webdataset>=0.2.86",
    "accelerate>=0.33.0",
    "omegaconf>=2.3.0",
    "braceexpand>=0.1.7",
    "tensorboard>=2.17.0",
    "wandb>=0.17.0",
    "numpy>=1.24.0",
    "pillow>=9.0.0",
    "pandas>=2.0.0",
    "scipy>=1.10.0",
    "torchmetrics>=1.0.0",
    "tqdm>=4.65.0",
    "regex",
    "ftfy",
]

[project.optional-dependencies]
dev = ["pytest>=7.0.0", "ruff>=0.6.0", "black>=24.0.0"]

[project.scripts]
mobile-fetal-clip = "mobile_fetal_clip.cli:main"

[project.urls]
Homepage = "https://numansaeed.com/MobileFetalCLIP/"
Repository = "https://github.com/numanai/MobileFetalCLIP"
Paper = "https://arxiv.org/abs/2603.05421"
"Hugging Face" = "https://huggingface.co/collections/numansaeed/fetal-ultrasound-models"

[tool.setuptools.packages.find]
where = ["src"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.pytest.ini_options]
testpaths = ["tests"]
